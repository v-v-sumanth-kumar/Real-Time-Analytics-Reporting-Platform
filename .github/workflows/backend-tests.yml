name: Backend tests

on:
  push:
    branches: [main, master]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "Backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_DB: analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U analytics -d analytics_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://analytics:analytics@localhost:5432/analytics_test
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@localhost:5432/analytics_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET_KEY: ci-test-jwt-secret-key-minimum-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: Backend

      - name: Run tests
        run: pytest -v
        working-directory: Backend
