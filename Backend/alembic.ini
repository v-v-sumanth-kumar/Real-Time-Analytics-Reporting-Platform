[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@dpg-d88j8grbc2fs73e9flgg-a.singapore-postgres.render.com:5432/analytics_m41h

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualifiers =

[logger_sqlalchemy]
level = WARN
handlers =
qualifiers = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualifiers = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

qualname = sqlalchemy.engine
qualname = alembic
